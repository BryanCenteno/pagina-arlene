<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="blog.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
</head>

<body>
    <div class="header_main animar" id="inicio">
        <a href="index.html#inicio" class="Navbar_iz animar">
            <img src="img/logo_png_Sf.png" alt="Logo">
            <span class="titulo">Un dulce espacio</span>
        </a>
        <nav class="Navbar_de animar">
            <ul id="menu_lista">
                <li class="Navbar_de_li"><a href="index.html#inicio">Inicio</a></li>
                <li class="Navbar_de_i"><i class="bi bi-list barra_none" onclick="abrirMenu()"></i></li>
            </ul>
        </nav>
    </div>
    <!--  -->
    <nav class="Navbar_responsive" id="menu">
        <button class="cerrar" onclick="cerrarMenu()">✖</button>
        <ul>
            <li class=""><a href="index.html#inicio" onclick="cerrarMenu()">Inicio</a></li>
            <div class="linea_navbar"></div>
        </ul>
    </nav>
    <!--  -->
    <section class="post_hero">
        <img id="post_imagen" src="" alt="">
        <div class="post_hero_texto">
            <span id="post_categoria"></span>
            <h1 id="post_titulo"></h1>
            <span id="post_fecha"></span>
        </div>
    </section>

    <section class="post_contenido">
        <div class="post_body" id="post_body">
            <!-- el contenido del artículo se carga aquí -->
        </div>
        <a href="index.html#blog" class="post_volver">← Volver al blog</a>
    </section>
    <!--  -->
    <script src="index.js"></script>
    <script src="post.js"></script>
</body>

</html>
